name: Fix NextAuth Secret

# Generates a strong NEXTAUTH_SECRET, sets it on the Vercel project (all
# environments: production/preview/development), and triggers a redeploy.
#
# Triggered manually via workflow_dispatch. Idempotent — if NEXTAUTH_SECRET
# already exists, the workflow will detect it and skip creation (use the
# Vercel dashboard to update an existing value).

on:
  workflow_dispatch:

jobs:
  fix:
    name: Set NEXTAUTH_SECRET on Vercel + redeploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set NEXTAUTH_SECRET + NEXTAUTH_URL on Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          # Generate a strong secret: 32 random bytes, base64-encoded
          NEXTAUTH_SECRET=$(openssl rand -base64 32)
          echo "Generated NEXTAUTH_SECRET (length: ${#NEXTAUTH_SECRET} chars)"

          # Check if NEXTAUTH_SECRET already exists on the project
          EXISTING=$(curl -sS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          envs = d.get('envs', [])
          matches = [e for e in envs if e.get('key') == 'NEXTAUTH_SECRET']
          if matches:
              print(matches[0].get('id', ''))
          ")

          if [ -n "$EXISTING" ]; then
            echo "NEXTAUTH_SECRET already exists (id=$EXISTING). Updating value..."
            # Delete the old one, then create a new one (Vercel API doesn't support
            # PATCH on encrypted env var values directly — delete + create is the
            # documented pattern).
            curl -sS -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING" \
              > /dev/null
            echo "Deleted old NEXTAUTH_SECRET"
          else
            echo "NEXTAUTH_SECRET does not exist. Creating fresh."
          fi

          # Create NEXTAUTH_SECRET targeting all environments
          echo "Creating NEXTAUTH_SECRET (target=production,preview,development)..."
          CREATE_RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"key\": \"NEXTAUTH_SECRET\",
              \"value\": \"$NEXTAUTH_SECRET\",
              \"type\": \"encrypted\",
              \"target\": [\"production\", \"preview\", \"development\"]
            }" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env")
          CREATED_ID=$(echo "$CREATE_RESP" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('id', 'ERROR'))" 2>/dev/null || echo "ERROR")
          if [ "$CREATED_ID" = "ERROR" ] || [ -z "$CREATED_ID" ]; then
            echo "ERROR: Failed to create NEXTAUTH_SECRET. Response:"
            echo "$CREATE_RESP"
            exit 1
          fi
          echo "OK: NEXTAUTH_SECRET created (id=$CREATED_ID)"

          # Check if NEXTAUTH_URL already exists
          EXISTING_URL=$(curl -sS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          envs = d.get('envs', [])
          matches = [e for e in envs if e.get('key') == 'NEXTAUTH_URL']
          if matches:
              print(matches[0].get('id', ''))
          ")

          if [ -n "$EXISTING_URL" ]; then
            echo "NEXTAUTH_URL already exists (id=$EXISTING_URL) — skipping."
          else
            echo "Creating NEXTAUTH_URL=https://typescribe-mu.vercel.app ..."
            URL_RESP=$(curl -sS -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"key\": \"NEXTAUTH_URL\",
                \"value\": \"https://typescribe-mu.vercel.app\",
                \"type\": \"plain\",
                \"target\": [\"production\", \"preview\", \"development\"]
              }" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env")
            URL_ID=$(echo "$URL_RESP" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('id', 'ERROR'))" 2>/dev/null || echo "ERROR")
            if [ "$URL_ID" = "ERROR" ] || [ -z "$URL_ID" ]; then
              echo "WARN: Failed to create NEXTAUTH_URL. Response:"
              echo "$URL_RESP"
            else
              echo "OK: NEXTAUTH_URL created (id=$URL_ID)"
            fi
          fi

          # Trigger a redeploy of the latest production deployment so the
          # new env vars are picked up. POST /v13/deployments with the
          # existing project + target=production.
          echo ""
          echo "=== Triggering Vercel redeploy ==="
          # Find the latest production deployment SHA
          LATEST_DEPLOY=$(curl -sS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=1&target=production" \
            | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['deployments'][0]['uid'] if d.get('deployments') else '')")
          if [ -z "$LATEST_DEPLOY" ]; then
            echo "ERROR: could not find latest production deployment to redeploy"
            exit 1
          fi
          echo "Latest production deploy: $LATEST_DEPLOY"

          REDEPLOY_RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deploymentId\": \"$LATEST_DEPLOY\"}" \
            "https://api.vercel.com/v13/deployments")
          NEW_DEPLOY_ID=$(echo "$REDEPLOY_RESP" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('id', 'ERROR'))" 2>/dev/null || echo "ERROR")
          if [ "$NEW_DEPLOY_ID" = "ERROR" ] || [ -z "$NEW_DEPLOY_ID" ]; then
            echo "ERROR: Failed to trigger redeploy. Response:"
            echo "$REDEPLOY_RESP"
            exit 1
          fi
          echo "OK: Redeploy triggered (new deployment id=$NEW_DEPLOY_ID)"
          echo ""
          echo "::set-output name=new_deploy_id::$NEW_DEPLOY_ID"

      - name: Wait for Vercel redeploy to be READY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          echo "Polling Vercel for redeploy to be READY..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=1" \
              | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['deployments'][0]['readyState'] if d.get('deployments') else 'none')")
            echo "  attempt $i: readyState=$STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "Vercel redeploy is READY."
              exit 0
            fi
            if [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "::error::Vercel deployment $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for Vercel deployment."
          exit 1

      - name: Test login endpoint
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Testing NextAuth credentials callback ==="
          sleep 5  # give the new deployment a moment to fully serve traffic

          # Get a CSRF token first
          CSRF_RESP=$(curl -sS -c /tmp/cookies.txt "https://typescribe-mu.vercel.app/api/auth/csrf")
          CSRF_TOKEN=$(echo "$CSRF_RESP" | python3 -c "import sys, json; print(json.load(sys.stdin).get('csrfToken', ''))")
          echo "Got CSRF token: ${CSRF_TOKEN:0:20}..."

          # POST credentials
          SIGNIN_RESP=$(curl -sS -o /tmp/signin.json -w "%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "email=testuser-e2e@typescribe.local&password=TestPass!2025&csrfToken=${CSRF_TOKEN}&callbackUrl=%2F&json=true" \
            "https://typescribe-mu.vercel.app/api/auth/callback/credentials")
          echo "Sign-in HTTP status: $SIGNIN_RESP"
          echo "Response body:"
          cat /tmp/signin.json | python3 -m json.tool 2>/dev/null || cat /tmp/signin.json

          if [ "$SIGNIN_RESP" = "200" ]; then
            echo ""
            echo "=== Login test PASSED ==="
            # Show cookies to confirm session was set
            echo "Session cookies set:"
            grep -v "^#" /tmp/cookies.txt 2>/dev/null | grep -v "^$" | awk '{print "  "$6" = "$7}'
          else
            echo ""
            echo "=== Login test FAILED ==="
            exit 1
          fi
