name: Sync CRON_SECRET to Vercel (one-off)

on:
  workflow_dispatch:  # Manual trigger only — run once to sync the secret

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync CRON_SECRET to Vercel project env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/sync_vercel_cron_secret.py
